<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar alumno' : 'Nuevo alumno'">Formulario alumno</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<h1 th:text="${modoEdicion} ? 'Editar alumno' : 'Nuevo alumno'"></h1>

<form th:action="@{/alumnos/guardar}" th:object="${alumno}" method="post">
    <input type="hidden" th:field="*{id}">

    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" th:field="*{nombre}" required>

    <label for="dni">DNI</label>
    <input type="text" id="dni" th:field="*{dni}" required>

    <label for="edad">Edad</label>
    <input type="number" id="edad" th:field="*{edad}" required>

    <label for="nota">Nota</label>
    <input type="number" step="0.1" id="nota" th:field="*{nota}" required>

    <div class="botones">
        <button type="submit">Guardar</button>
        <a th:href="@{/alumnos}" class="btn-cancelar">Cancelar</a>
    </div>
</form>

</body>
</html>
