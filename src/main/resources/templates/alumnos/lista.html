<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de alumnos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            color: #333;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .sin-datos {
            margin-top: 20px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

<h1>Listado de alumnos</h1>

<div th:if="${#lists.isEmpty(alumnos)}" class="sin-datos">
    No hay alumnos registrados.
</div>

<table th:if="${!#lists.isEmpty(alumnos)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>DNI</th>
        <th>Edad</th>
        <th>Nota</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="alumno : ${alumnos}">
        <td th:text="${alumno.id}"></td>
        <td th:text="${alumno.nombre}"></td>
        <td th:text="${alumno.dni}"></td>
        <td th:text="${alumno.edad}"></td>
        <td th:text="${alumno.nota}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
