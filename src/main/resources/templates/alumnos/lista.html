<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de alumnos</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<h1>Listado de alumnos</h1>

<a th:href="@{/alumnos/nuevo}" class="boton">Nuevo alumno</a>

<div th:if="${#lists.isEmpty(alumnos)}" class="sin-datos">
    No hay alumnos registrados.
</div>

<table th:if="${!#lists.isEmpty(alumnos)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>DNI</th>
        <th>Edad</th>
        <th>Nota</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="alumno : ${alumnos}">
        <td th:text="${alumno.id}"></td>
        <td th:text="${alumno.nombre}"></td>
        <td th:text="${alumno.dni}"></td>
        <td th:text="${alumno.edad}"></td>
        <td th:text="${alumno.nota}"></td>
        <td>
            <a th:href="@{/alumnos/editar/{id}(id=${alumno.id})}" class="accion editar">Editar</a>
            <a th:href="@{/alumnos/eliminar/{id}(id=${alumno.id})}"
               class="accion eliminar"
               onclick="return confirm('¿Seguro que quieres eliminar este alumno?')">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
